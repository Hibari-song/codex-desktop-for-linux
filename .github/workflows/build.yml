name: Build Linux (Manual)

on:
  workflow_dispatch:

env:
  NODE_VERSION: "24"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: |
          npm ci
          npm install @cometix/codex@latest
      - run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg 7zip
      - run: node scripts/sync-upstream.js --force --skip-win
      - run: node scripts/patch-all.js unix
      - run: npm run build:linux-${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: Codex-Desktop-Rebuild-Linux-${{ matrix.arch }}
          path: |
            out/make/deb/**/*.deb
            out/make/rpm/**/*.rpm
            out/make/zip/**/*.zip
          if-no-files-found: error
