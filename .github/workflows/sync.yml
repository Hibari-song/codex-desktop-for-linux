name: Sync Upstream & Patch Linux

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force sync even without version change"
        type: boolean
        default: false

env:
  NODE_VERSION: "24"

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_update: ${{ steps.detect.outputs.has_update }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Check upstream versions
        id: detect
        run: |
          set +e
          node scripts/check-update.js --json >/tmp/codex-version.json 2>/tmp/codex-version.err
          exit_code=$?
          set -e

          if [ "${{ inputs.force }}" = "true" ]; then
            echo "has_update=true" >> "$GITHUB_OUTPUT"
          elif [ $exit_code -eq 0 ]; then
            HAS_UPDATE=$(node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync('/tmp/codex-version.json','utf8')); console.log(j.hasUpdates ? 'true' : 'false')")
            echo "has_update=$HAS_UPDATE" >> "$GITHUB_OUTPUT"
          else
            echo "has_update=false" >> "$GITHUB_OUTPUT"
            cat /tmp/codex-version.err || true
          fi

  build-linux:
    needs: check
    if: needs.check.outputs.has_update == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg 7zip
      - run: |
          npm ci
          npm install @cometix/codex@latest
      - name: Sync upstream app assets
        run: node scripts/sync-upstream.js --force --skip-win
      - run: node scripts/patch-all.js unix
      - run: npm run build:linux-${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: Codex-Desktop-Rebuild-Linux-${{ matrix.arch }}
          path: |
            out/make/deb/**/*.deb
            out/make/rpm/**/*.rpm
            out/make/zip/**/*.zip
          if-no-files-found: error

  release:
    needs: [check, build-linux]
    if: needs.check.outputs.has_update == 'true' && needs.build-linux.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - name: Get upstream version and tag
        id: version
        run: |
          RESULT=$(node scripts/check-update.js --json --force)
          VERSION=$(echo "$RESULT" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);console.log(j.platforms?.macOS?.version||'')}catch{console.log('')}})")

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ -z "$VERSION" ]; then echo "No upstream version detected"; exit 0; fi

          node -e "
            const fs=require('fs'), p=JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version='$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n');
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git diff --cached --quiet && echo "No version change" && exit 0
          git commit -m "Bump Linux rebuild to upstream ${VERSION}"
          git tag -a "v${VERSION}" -m "Codex Desktop Rebuild Linux ${VERSION}"
          git push origin HEAD --tags
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: ls -lhR artifacts/
      - name: Create draft release
        if: steps.version.outputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Codex Desktop Rebuild Linux ${{ steps.version.outputs.version }}
          body: |
            Unofficial Linux desktop rebuild.

            - Upstream desktop source version: `${{ steps.version.outputs.version }}`
            - Linux-only package artifacts: DEB, RPM, ZIP
            - Not affiliated with, endorsed by, or sponsored by OpenAI
          files: |
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
